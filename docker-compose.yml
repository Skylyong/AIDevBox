services:
  dev:
    build:
      context: .
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - ALL_PROXY=${ALL_PROXY:-}
    image: docker-server.tcm403.site/aidevbox:last
    env_file:
      - .env
    ports:
      - "22255:22"
    volumes:
      # workspace（可配置）
      - ${PROJECT_DIR:-~/projects}:/workspace

      # 持久化 dev 用户 home 目录
      # - ${DEV_HOME_DIR:-~/dev-home}:/home/dev

      # 宿主机 AI 工具配置（cc-switch 管理），同时挂载到 root 和 dev，热同步
      # .claude.json 只读挂载到临时路径，entrypoint 复制并修正归属，避免 UID 不匹配导致写入失败
      - ~/.claude.json:/tmp/claude_host.json:ro
      - ~/.claude:/root/.claude
      - ~/.claude:/home/dev/.claude
      - ~/.codex:/root/.codex
      - ~/.codex:/home/dev/.codex
      - ~/.config/opencode:/root/.config/opencode
      - ~/.config/opencode:/home/dev/.config/opencode

      # SSH public key（mounted as template, entrypoint copies with correct ownership）
      - ${SSH_AUTHORIZED_KEYS:-~/.ssh/id_ed25519.pub}:/tmp/authorized_keys:ro

      # .profile: SSH login starts in /workspace
      - ./dotfiles/root-profile:/root/.profile:ro
      - ./dotfiles/dev-profile:/home/dev/.bash_profile:ro

      # Entrypoint script
      - ./entrypoint.sh:/entrypoint.sh:ro

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # Proxy is opt-in. Leave these empty for direct networking.
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - all_proxy=${all_proxy:-}
      - no_proxy=${no_proxy:-localhost,127.0.0.1,host.docker.internal}

    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    working_dir: /workspace
    restart: unless-stopped
