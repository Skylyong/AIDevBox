services:
  dev:
    build: .
    image: python-ai-dev:3.12
    ports:
      - "22255:22"
    volumes:
      # workspace
      - ~/projects:/workspace

      # SSH public key (mounted as template, entrypoint copies with correct ownership)
      - ${SSH_AUTHORIZED_KEYS:-/home/ubuntu/.ssh/authorized_keys}:/tmp/authorized_keys:ro

      # root .profile: SSH login starts in /workspace
      - ./dotfiles/root-profile:/root/.profile:ro

      # AI tool config templates (from repo, read-only)
      - ./dotfiles/claudeCode/.claude/settings.json:/tmp/claude-settings.json:ro
      - ./dotfiles/claudeCode/.claude.json:/tmp/claude.json:ro
      - ./dotfiles/codex/.codex/config.toml:/tmp/codex-config.toml:ro
      - ./dotfiles/opencode/opencode.json:/tmp/opencode.json:ro

      # Entrypoint script
      - ./entrypoint.sh:/entrypoint.sh:ro

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - BAILIAN_API_KEY
      - HTTP_PROXY=http://host.docker.internal:${PROXY_PORT:-7890}
      - HTTPS_PROXY=http://host.docker.internal:${PROXY_PORT:-7890}
      - ALL_PROXY=socks5://host.docker.internal:${PROXY_PORT:-7890}
      - NO_PROXY=localhost,127.0.0.1,host.docker.internal
      - http_proxy=http://host.docker.internal:${PROXY_PORT:-7890}
      - https_proxy=http://host.docker.internal:${PROXY_PORT:-7890}
      - all_proxy=socks5://host.docker.internal:${PROXY_PORT:-7890}
      - no_proxy=localhost,127.0.0.1,host.docker.internal

    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    working_dir: /workspace
    restart: unless-stopped
